<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARP – משחקי חינם</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N3JTRQPYRV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-N3JTRQPYRV');
</script>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b14; --bg2:#111222; --bg3:#181930; --card:#141528; --card-h:#1c1e38;
  --accent:#ff3e6c; --purple:#7b2fff; --blue:#00d4ff; --gold:#ffcc00;
  --text:#e8eaf6; --muted:#6e7191; --border:rgba(255,255,255,0.07);
  --r:14px; --t:0.25s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"Exo 2","Heebo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(123,47,255,.14) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 85% 100%,rgba(255,62,108,.09) 0%,transparent 55%);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(10,11,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr{max-width:1300px;margin:0 auto;height:62px;padding:0 1.5rem;display:flex;align-items:center;gap:1.25rem;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px rgba(123,47,255,.4);}
.logo-name{font-size:1.4rem;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#fff 40%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.search{flex:1;max-width:420px;position:relative;}
.search input{width:100%;padding:9px 18px 9px 42px;background:var(--bg3);border:1.5px solid var(--border);border-radius:50px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;transition:var(--t);}
.search input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,47,255,.12);}
.search input::placeholder{color:var(--muted);}
.search-ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;}
.hdr-right{margin-right:auto;display:flex;align-items:center;gap:.6rem;}
.btn{padding:8px 20px;border-radius:50px;font-family:inherit;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:var(--t);}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;box-shadow:0 3px 16px rgba(123,47,255,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,62,108,.35);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--purple);}

/* USER AVATAR */
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;cursor:pointer;border:2px solid var(--border);transition:var(--t);position:relative;flex-shrink:0;}
.user-avatar:hover{border-color:var(--purple);box-shadow:0 0 12px rgba(123,47,255,.4);}
.user-avatar .anon-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#888;border:2px solid var(--bg);}
.user-avatar .auth-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#00e676;border:2px solid var(--bg);}

/* USER DROPDOWN */
.user-dropdown{position:absolute;top:52px;left:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);width:220px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.7);display:none;z-index:300;animation:fadeUp .2s ease;}
.user-dropdown.open{display:block;}
.ud-info{padding:12px 14px;border-bottom:1px solid var(--border);}
.ud-info .ud-name{font-size:.85rem;font-weight:700;margin-bottom:2px;}
.ud-info .ud-email{font-size:.72rem;color:var(--muted);}
.ud-btn{width:100%;padding:10px 14px;background:none;border:none;color:var(--text);font-family:inherit;font-size:.82rem;font-weight:600;text-align:right;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:8px;}
.ud-btn:hover{background:rgba(123,47,255,.1);color:var(--purple);}
.ud-btn.danger:hover{background:rgba(255,62,108,.1);color:var(--accent);}

/* AUTH MODAL */
.auth-modal-bg{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;}
.auth-modal-bg.open{display:flex;}
.auth-modal{background:var(--bg2);border:1px solid rgba(123,47,255,.3);border-radius:20px;width:100%;max-width:400px;padding:2rem;animation:modalIn .25s ease;position:relative;}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.auth-close{position:absolute;top:1rem;left:1rem;width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);}
.auth-close:hover{color:var(--accent);border-color:var(--accent);}
.auth-logo{text-align:center;margin-bottom:1.5rem;}
.auth-logo .al-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--accent));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto .75rem;box-shadow:0 0 24px rgba(123,47,255,.4);}
.auth-logo h2{font-size:1.2rem;font-weight:900;}
.auth-logo p{font-size:.8rem;color:var(--muted);margin-top:4px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:50px;padding:3px;margin-bottom:1.4rem;}
.auth-tab{flex:1;padding:7px;border-radius:50px;font-family:inherit;font-weight:700;font-size:.8rem;border:none;cursor:pointer;background:none;color:var(--muted);transition:var(--t);}
.auth-tab.active{background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;}
.auth-field{margin-bottom:1rem;}
.auth-field label{font-size:.75rem;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
.auth-field input{width:100%;padding:10px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;transition:var(--t);}
.auth-field input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,47,255,.12);}
.auth-submit{width:100%;padding:11px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;font-family:inherit;font-weight:800;font-size:.9rem;border:none;cursor:pointer;transition:var(--t);margin-bottom:.8rem;}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(123,47,255,.4);}
.auth-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.auth-divider{display:flex;align-items:center;gap:.75rem;margin:.8rem 0;color:var(--muted);font-size:.75rem;}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--border);}
.btn-google{width:100%;padding:10px;border-radius:10px;background:var(--bg3);border:1.5px solid var(--border);color:var(--text);font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:.6rem;}
.btn-google:hover{border-color:var(--purple);background:rgba(123,47,255,.08);}
.btn-anon{width:100%;padding:9px;border-radius:10px;background:none;border:1px dashed rgba(255,255,255,.15);color:var(--muted);font-family:inherit;font-weight:600;font-size:.78rem;cursor:pointer;transition:var(--t);}
.btn-anon:hover{border-color:var(--muted);color:var(--text);}
.auth-err{background:rgba(255,62,108,.1);border:1px solid rgba(255,62,108,.3);border-radius:8px;padding:8px 12px;font-size:.78rem;color:var(--accent);margin-bottom:.75rem;display:none;}

/* CATBAR */
nav.catbar{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:100;}
.catbar-inner{max-width:1300px;margin:0 auto;padding:0 1.5rem;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.catbar-inner::-webkit-scrollbar{display:none;}
.cat{padding:12px 16px;font-size:.8rem;font-weight:700;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;transition:var(--t);cursor:pointer;background:none;border-top:none;border-right:none;border-left:none;font-family:inherit;}
.cat:hover{color:var(--text);}
.cat.active{color:var(--blue);border-bottom-color:var(--blue);}

/* MAIN */
main{max-width:1300px;margin:0 auto;padding:2rem 1.5rem 5rem;position:relative;z-index:1;}

/* STATES */
.state-box{background:var(--card);border:1.5px dashed rgba(123,47,255,.25);border-radius:var(--r);padding:4rem 2rem;text-align:center;}
.state-box .ico{font-size:2.5rem;opacity:.35;margin-bottom:.75rem;}
.state-box p{font-size:.88rem;color:var(--muted);}

/* SECTION */
.sec-hdr{display:flex;align-items:center;margin-bottom:1.1rem;margin-top:2.5rem;gap:.6rem;}
.sec-hdr:first-child{margin-top:0;}
.sec-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.sec-name{font-size:1.05rem;font-weight:800;}
.sec-count{font-size:.72rem;color:var(--muted);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.9rem;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--t);animation:fadeUp .4s ease both;}
.card:hover{transform:translateY(-5px) scale(1.02);border-color:var(--purple);box-shadow:0 16px 40px rgba(0,0,0,.45),0 0 0 1px var(--purple),0 0 30px rgba(123,47,255,.2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.card-thumb{aspect-ratio:16/10;width:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:var(--t);}
.card:hover .card-thumb img{transform:scale(1.07);}
.no-thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;transition:var(--t);}
.card:hover .no-thumb{transform:scale(1.1);}
.play-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--t);backdrop-filter:blur(3px);}
.card:hover .play-ov{opacity:1;}
.play-circle{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;box-shadow:0 0 24px rgba(255,62,108,.5);transform:scale(.8);transition:var(--t);}
.card:hover .play-circle{transform:scale(1);}
.badge{position:absolute;top:7px;right:7px;padding:2px 9px;border-radius:50px;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.badge-new{background:var(--accent);color:#fff;}
.badge-hot{background:linear-gradient(135deg,#ff6b00,var(--gold));color:#000;}
.badge-top{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;}

/* EMBEDDABLE BADGE */
.embed-badge{position:absolute;top:7px;left:7px;padding:3px 9px;border-radius:50px;font-size:.6rem;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:4px;backdrop-filter:blur(6px);}
.embed-yes{background:rgba(0,230,118,.18);color:#00e676;border:1px solid rgba(0,230,118,.35);}
.embed-no{background:rgba(255,62,108,.18);color:#ff3e6c;border:1px solid rgba(255,62,108,.35);}

/* SAVES DATA BADGE (on card) */
.saves-badge{position:absolute;bottom:7px;left:7px;padding:3px 9px;border-radius:50px;font-size:.6rem;font-weight:800;letter-spacing:.3px;backdrop-filter:blur(6px);}
.saves-yes{background:rgba(0,212,255,.18);color:#00d4ff;border:1px solid rgba(0,212,255,.35);}
.saves-no{background:rgba(110,113,145,.18);color:#6e7191;border:1px solid rgba(110,113,145,.25);}

/* PLATFORM BADGE (on card) */
.plat-badge{position:absolute;bottom:7px;right:7px;padding:3px 9px;border-radius:50px;font-size:.6rem;font-weight:800;letter-spacing:.3px;backdrop-filter:blur(6px);background:rgba(255,204,0,.15);color:#ffcc00;border:1px solid rgba(255,204,0,.3);}

/* SAVES DATA ROW in modal */
.modal-saves{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:.75rem;font-weight:700;border-top:1px solid var(--border);}
.modal-saves.yes{color:#00d4ff;}
.modal-saves.no{color:var(--muted);}
.modal-saves .saves-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.modal-saves.yes .saves-dot{background:#00d4ff;box-shadow:0 0 6px #00d4ff;}
.modal-saves.no .saves-dot{background:var(--muted);}

/* BLOCKED CARD OVERLAY */
.card.blocked .card-thumb::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45);pointer-events:none;}
.card.blocked{opacity:.85;}
.card.blocked:hover{border-color:rgba(255,62,108,.5);box-shadow:0 16px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,62,108,.5),0 0 30px rgba(255,62,108,.12);}
.play-circle-ext{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;transform:scale(.8);transition:var(--t);}
.card:hover .play-circle-ext{transform:scale(1);}

.card-body{padding:10px 12px 12px;}
.card-name{font-size:.85rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:.62rem;font-weight:600;background:var(--bg3);color:var(--muted);padding:2px 8px;border-radius:50px;border:1px solid var(--border);}

/* GAME MODAL */
.modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);display:none;align-items:stretch;justify-content:center;padding:0;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border-left:1px solid rgba(123,47,255,.25);border-right:1px solid rgba(123,47,255,.25);width:100%;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.8);animation:modalIn .25s ease;height:100vh;}
.modal-hdr{display:flex;align-items:center;gap:.75rem;padding:.9rem 1.25rem;border-bottom:1px solid var(--border);background:var(--bg3);flex-wrap:wrap;}
.modal-title{font-size:.95rem;font-weight:800;flex:1;}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);flex-shrink:0;}
.modal-close:hover{background:rgba(255,62,108,.15);color:var(--accent);border-color:var(--accent);}
.modal-body{position:relative;flex:1;min-height:0;}
.modal-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.modal-err{position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--muted);font-size:.88rem;text-align:center;padding:2rem;display:none;}
.modal-err .ico{font-size:2.5rem;}
.modal-err a{color:var(--blue);text-decoration:none;font-weight:700;border:1px solid rgba(0,212,255,.3);padding:7px 18px;border-radius:50px;transition:var(--t);}
.modal-err a:hover{background:rgba(0,212,255,.08);}

/* NO RESULTS */
#no-results{display:none;text-align:center;padding:4rem 2rem;color:var(--muted);}
#no-results .ico{font-size:2.5rem;opacity:.3;margin-bottom:.75rem;}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:50%;transform:translateX(50%);background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-size:.82rem;font-weight:700;color:var(--text);z-index:900;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:opacity .3s ease,transform .3s ease;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
.toast.success{border-color:rgba(0,230,118,.4);color:#00e676;}
.toast.error{border-color:rgba(255,62,108,.4);color:var(--accent);}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:2rem 1.5rem;text-align:center;color:var(--muted);font-size:.78rem;position:relative;z-index:1;}

@media(max-width:600px){
  .hdr{padding:0 1rem;}
  .btn span{display:none;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .modal{border-radius:0;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr">
    <a href="#" class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-name">WARP</span>
    </a>
    <form class="search" autocomplete="off" onsubmit="return false" role="search">
      <span class="search-ic">🔍</span>
      <input type="email" style="display:none" aria-hidden="true" tabindex="-1">
      <input type="text" id="searchInput" placeholder="חפש משחק, תגית, קטגוריה..." autocomplete="off" name="search" role="searchbox">
    </form>
    <div class="hdr-right">
      <div id="userMenu" style="position:relative;">
        <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()">
          <span id="userInitial">?</span>
          <span class="anon-dot" id="userDot"></span>
        </div>
        <div class="user-dropdown" id="userDropdown">
          <div class="ud-info">
            <div class="ud-name" id="udName">אנונימי</div>
            <div class="ud-email" id="udEmail">לא מחובר לחשבון</div>
          </div>
          <button class="ud-btn" id="udAuthBtn" onclick="openAuth()">🔑 התחברות / הרשמה</button>
          <button class="ud-btn danger" id="udSignout" onclick="signOutUser()" style="display:none">🚪 התנתקות</button>
        </div>
      </div>
      <button class="btn btn-primary" id="headerAuthBtn" onclick="openAuth()">🔑 <span>התחברות</span></button>
    </div>
  </div>
</header>

<nav class="catbar">
  <div class="catbar-inner" id="catBar">
    <button class="cat active" data-cat="all">🎮 הכל</button>
  </div>
</nav>

<main id="main">
  <div class="state-box" id="loadingState">
    <div class="ico">⏳</div>
    <p>טוען משחקים...</p>
  </div>
  <div class="state-box" id="errorState" style="display:none">
    <div class="ico">❌</div>
    <p id="errorMsg">שגיאה בטעינת games.json</p>
  </div>
  <div id="content" style="display:none">
    <div id="no-results">
      <div class="ico">🔍</div>
      <p>לא נמצאו משחקים</p>
    </div>
  </div>
</main>

<!-- GAME MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hdr">
      <span id="modalTitle" class="modal-title"></span>
      <div id="modalMeta" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-saves no" id="modalSaves">
      <div class="saves-dot"></div>
      <span id="modalSavesText">לא שומר נתונים</span>
    </div>
    <div class="modal-body">
      <iframe id="modalIframe" allowfullscreen></iframe>
      <div class="modal-err" id="modalErr">
        <div class="ico">🚫</div>
        <p>האתר הזה חוסם הטמעה ב-iframe.</p>
        <a id="modalOpenLink" href="#" target="_blank" rel="noopener">פתח משחק ↗</a>
      </div>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="auth-modal-bg" id="authBg">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-logo">
      <div class="al-icon">⚡</div>
      <h2>ברוך הבא ל-WARP</h2>
      <p>שמור את ההתקדמות שלך בכל המשחקים</p>
    </div>

    <!-- Google + Anon buttons (always visible) -->
    <button class="btn-google" onclick="signInWithGoogle()">

<!-- ==================== EARLY STUBS: prevent "not defined" errors before module loads ==================== -->
<script>
// These stubs ensure onclick= attributes don't throw before the Firebase module initialises.
// The real implementations override them once the module is ready.
['openAuth','closeAuth','switchTab','toggleDropdown','signInWithGoogle',
 'signInEmail','registerEmail','continueAnonymously','signOutUser','forgotPassword'
].forEach(fn => {
  if (!window[fn]) window[fn] = (...args) => {
    // Queue the call until the real function is ready
    document.addEventListener('_warpReady', () => window[fn](...args), { once: true });
  };
});
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAnalytics, logEvent } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js';

} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {

} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  getDatabase, ref, get
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  authDomain: "warp-games.firebaseapp.com",
  databaseURL: "https://warp-games-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "warp-games",
  storageBucket: "warp-games.firebasestorage.app",
  messagingSenderId: "299502091770",
  appId: "1:299502091770:web:582593b7b31884bfbcf843",

};

const app      = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth     = getAuth(app);
const db       = getFirestore(app);
const rtdb     = getDatabase(app);
const googleProvider = new GoogleAuthProvider();

// expose to global so non-module scripts can call them
window._firebase = { auth, db, rtdb, ref, get, analytics, logEvent, googleProvider,
  signInAnonymously, signInWithPopup, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, updateProfile, signOut, sendPasswordResetEmail,
  doc, getDoc, setDoc, deleteDoc, collection, getDocs };

// ── GA: page_view ────────────────────────────────────────
logEvent(analytics, 'page_view', { page_title: 'WARP Games', page_location: location.href });

// ── CLOUD localStorage PROXY ─────────────────────────────
// Works like localStorage but syncs every key to Firestore under:
//   users/{uid}/localStorage/{key}  →  { value: "..." }
// Falls back to real localStorage when offline or not authed.

const _lsCache = {}; // in-memory mirror

async function loadCloudStorage(uid) {
  try {
    const col = collection(db, 'users', uid, 'localStorage');
    const snap = await getDocs(col);
    snap.forEach(d => { _lsCache[d.id] = d.data().value; });
    console.log(`[WARP Cloud] Loaded ${snap.size} keys from Firestore`);
  } catch(e) { console.warn('[WARP Cloud] Load failed', e); }
}

const cloudLS = {
  setItem(key, value) {
    value = String(value);
    _lsCache[key] = value;
    // persist to real localStorage as backup
    try { localStorage.setItem(key, value); } catch(_) {}
    // async write to Firestore
    const uid = auth.currentUser?.uid;
    if (uid) {
      setDoc(doc(db, 'users', uid, 'localStorage', key), { value })
        .catch(e => console.warn('[WARP Cloud] setItem failed', e));
    }
    logEvent(analytics, 'ls_set', { key });
  },
  getItem(key) {
    if (key in _lsCache) return _lsCache[key];
    try { return localStorage.getItem(key); } catch(_) { return null; }
  },
  removeItem(key) {
    delete _lsCache[key];
    try { localStorage.removeItem(key); } catch(_) {}
    const uid = auth.currentUser?.uid;
    if (uid) {
      deleteDoc(doc(db, 'users', uid, 'localStorage', key))
        .catch(e => console.warn('[WARP Cloud] removeItem failed', e));
    }
  },
  clear() {
    Object.keys(_lsCache).forEach(k => cloudLS.removeItem(k));
  },
  key(i) { return Object.keys(_lsCache)[i] ?? null; },
  get length() { return Object.keys(_lsCache).length; }
};

// Override global localStorage on this page
Object.defineProperty(window, 'localStorage', {
  get: () => cloudLS,
  configurable: true
});

// ── AUTH STATE ───────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  window._currentUser = user;

  if (user) {
    // load cloud storage for this user
    await loadCloudStorage(user.uid);

    // update UI
    const isAnon = user.isAnonymous;
    const name   = user.displayName || (isAnon ? 'אורח' : user.email?.split('@')[0] || 'משתמש');
    const initial = name[0].toUpperCase();

    document.getElementById('userInitial').textContent = initial;
    const dot = document.getElementById('userDot');
    dot.className = isAnon ? 'anon-dot' : 'auth-dot';

    document.getElementById('udName').textContent = name;
    document.getElementById('udEmail').textContent = isAnon ? 'מצב אורח' : (user.email || '');
    document.getElementById('udAuthBtn').style.display = isAnon ? '' : 'none';
    document.getElementById('udSignout').style.display = isAnon ? 'none' : '';
    document.getElementById('headerAuthBtn').style.display = isAnon ? '' : 'none';

    logEvent(analytics, 'login', { method: isAnon ? 'anonymous' : user.providerData[0]?.providerId });
  } else {
    // auto sign-in anonymously
    signInAnonymously(auth).catch(e => console.error('[WARP Auth]', e));
  }
});

// ── AUTH FUNCTIONS (exposed to global) ───────────────────
window.signInWithGoogle = async () => {
  clearAuthErr();
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const isNew = result._tokenResponse?.isNewUser;
    logEvent(analytics, isNew ? 'sign_up' : 'login', { method: 'google.com' });
    closeAuth();
    showToast(isNew ? '🎉 ברוך הבא ל-WARP!' : '✅ התחברת בהצלחה עם Google!', 'success');
  } catch(e) { showAuthErr(formatErr(e)); }
};

window.signInEmail = async () => {
  clearAuthErr();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) return showAuthErr('נא למלא אימייל וסיסמה');
  setBtn('loginBtn', true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    logEvent(analytics, 'login', { method: 'email' });
    closeAuth();
    showToast('✅ ברוך הבא!', 'success');
  } catch(e) { showAuthErr(formatErr(e)); }
  finally { setBtn('loginBtn', false); }
};

window.forgotPassword = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) return showAuthErr('הכנס את האימייל שלך כדי לאפס סיסמה');
  try {
    await sendPasswordResetEmail(auth, email);
    logEvent(analytics, 'forgot_password');
    showToast('📧 נשלח מייל לאיפוס סיסמה!', 'success');
    clearAuthErr();
  } catch(e) { showAuthErr(formatErr(e)); }
};

window.registerEmail = async () => {
  clearAuthErr();
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showAuthErr('נא למלא את כל השדות');
  if (pass.length < 6) return showAuthErr('סיסמה חייבת להיות לפחות 6 תווים');
  setBtn('registerBtn', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    logEvent(analytics, 'sign_up', { method: 'email' });
    closeAuth();
    showToast('🎉 החשבון נוצר בהצלחה!', 'success');
  } catch(e) { showAuthErr(formatErr(e)); }
  finally { setBtn('registerBtn', false); }
};

window.continueAnonymously = async () => {
  if (!auth.currentUser) {
    await signInAnonymously(auth);
  }
  closeAuth();
  showToast('👤 נכנסת כאורח', 'success');
};

window.signOutUser = async () => {
  await signOut(auth);
  Object.keys(_lsCache).forEach(k => delete _lsCache[k]);
  closeDropdown();
  showToast('👋 התנתקת', 'success');
};

// ── HELPERS ──────────────────────────────────────────────
function formatErr(e) {
  const map = {
    'auth/user-not-found': 'לא נמצא משתמש עם אימייל זה',
    'auth/wrong-password': 'סיסמה שגויה',
    'auth/email-already-in-use': 'האימייל כבר בשימוש',
    'auth/invalid-email': 'אימייל לא תקין',
    'auth/weak-password': 'הסיסמה חלשה מדי',
    'auth/popup-closed-by-user': 'חלון ההתחברות נסגר',
    'auth/invalid-credential': 'פרטי כניסה שגויים',
  };
  return map[e.code] || e.message;
}
function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg; el.style.display = '';
}
function clearAuthErr() {
  document.getElementById('authErr').style.display = 'none';
}
function setBtn(id, loading) {
  const el = document.getElementById(id);
  el.disabled = loading;
  if (id === 'loginBtn')    el.textContent = loading ? 'מתחבר...' : 'כניסה';
  if (id === 'registerBtn') el.textContent = loading ? 'יוצר חשבון...' : 'יצירת חשבון';
}

// Signal that all auth functions are ready

<script>


const CAT_LABELS = {
  all:'🎮 הכל', action:'⚡ פעולה', puzzle:'🧩 פאזל',
  arcade:'👾 ארקייד', racing:'🏎️ מירוצים', rpg:'⚔️ RPG',
  strategy:'♟️ אסטרטגיה', sports:'⚽ ספורט', shooter:'🔫 יריות',
  board:'🎲 לוח', survival:'💀 הישרדות', casual:'🌟 כיפי', adventure:'🗺️ הרפתקה',
};
const CAT_COLORS = {
  action:'#ff3e6c', puzzle:'#00d4ff', arcade:'#7b2fff', racing:'#ffcc00',
  rpg:'#8800ff', strategy:'#00ff88', sports:'#00cfff', shooter:'#ff6b00',
  board:'#aa88ff', survival:'#ff4444', casual:'#ffaa00', adventure:'#44ddff',
};

let allGames = [], currentCat = 'all', currentSearch = '';

async function load() {
  try {
    // Wait for the Firebase module to finish initialising if needed
    if (!window._firebase) {
      await new Promise(res => document.addEventListener('_warpReady', res, { once: true }));
    }
    const { rtdb, ref, get } = window._firebase;
    const snap = await get(ref(rtdb, 'games'));
    if (!snap.exists()) throw new Error('אין נתונים ב-Realtime Database תחת /games');
    const val = snap.val();
    allGames = Array.isArray(val)
      ? val.filter(Boolean)
      : Object.values(val);
    if (!allGames.length) throw new Error('רשימת המשחקים ריקה');
    init();
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = '';
    document.getElementById('errorMsg').textContent = 'שגיאה: ' + e.message;
    console.error('[WARP load]', e);
  }
}

function init() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('content').style.display = '';
  buildCatBar();
  render();
}

function buildCatBar() {
  const cats = new Set();
  allGames.forEach(g => (g.categories||[]).forEach(c => cats.add(c)));
  const bar = document.getElementById('catBar');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat'; btn.dataset.cat = cat;
    btn.textContent = CAT_LABELS[cat] || ('🎮 '+cat);
    btn.addEventListener('click', () => setCat(cat));
    bar.appendChild(btn);
  });
  bar.querySelector('[data-cat="all"]').addEventListener('click', () => setCat('all'));
}

function setCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
  if (window._firebase) {
    window._firebase.logEvent(window._firebase.analytics, 'select_category', { category: cat });
  }
}

function isMobile() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;
}

function render() {
  const content = document.getElementById('content');
  content.querySelectorAll('.section').forEach(s => s.remove());
  const q = currentSearch.trim().toLowerCase();
  const mobile = isMobile();
  let games = allGames.filter(g => {
    // platform filter
    const plat = g.platform || ['desktop', 'mobile'];
    if (mobile && !plat.includes('mobile')) return false;
    if (!mobile && !plat.includes('desktop')) return false;
    if (currentCat !== 'all' && !(g.categories||[]).includes(currentCat)) return false;
    if (!q) return true;
    return g.name.toLowerCase().includes(q) ||
      (g.tags||[]).some(t => t.toLowerCase().includes(q)) ||
      (g.categories||[]).some(c => c.toLowerCase().includes(q)) ||
      (g.description||'').toLowerCase().includes(q);
  });
  const noRes = document.getElementById('no-results');
  noRes.style.display = games.length === 0 ? '' : 'none';
  if (!games.length) return;

  if (currentCat === 'all' && !q) {
    const groups = {};
    games.forEach(g => { const c = (g.categories||['other'])[0]; if(!groups[c]) groups[c]=[]; groups[c].push(g); });
    Object.entries(groups).forEach(([cat,list]) => content.appendChild(buildSection(cat, list)));
  } else {
    const title = q ? 'תוצאות עבור "'+q+'"' : (CAT_LABELS[currentCat]||currentCat);
    content.appendChild(buildSection(null, games, title));
  }
}

function buildSection(cat, games, override) {
  const wrap = document.createElement('div'); wrap.className = 'section';
  const hdr = document.createElement('div'); hdr.className = 'sec-hdr';
  const ic = document.createElement('div'); ic.className = 'sec-ic';
  ic.style.background = (CAT_COLORS[cat]||'#7b2fff')+'22';
  ic.textContent = (CAT_LABELS[cat]||'🎮').split(' ')[0];
  const nm = document.createElement('span'); nm.className = 'sec-name';
  nm.textContent = override || CAT_LABELS[cat] || cat;
  const cnt = document.createElement('span'); cnt.className = 'sec-count';
  cnt.textContent = games.length + ' משחקים';
  hdr.append(ic, nm, cnt);
  const grid = document.createElement('div'); grid.className = 'grid';
  games.forEach((g,i) => { const c = buildCard(g); c.style.animationDelay = i*0.04+'s'; grid.appendChild(c); });
  wrap.append(hdr, grid);
  return wrap;
}

function buildCard(game) {
  const canEmbed = game.embeddable !== false;
  const card = document.createElement('div');
  card.className = 'card' + (canEmbed ? '' : ' blocked');
  const cat = (game.categories||[])[0];
  const color = CAT_COLORS[cat]||'#7b2fff';
  const thumb = document.createElement('div'); thumb.className = 'card-thumb';
  thumb.style.background = 'linear-gradient(135deg,'+color+'22,'+color+'08)';
  if (game.thumbnail) {
    const img = document.createElement('img'); img.src = game.thumbnail; img.alt = game.name;
    img.onerror = () => img.replaceWith(noThumb(game, color));
    thumb.appendChild(img);
  } else { thumb.appendChild(noThumb(game, color)); }
  if (game.badge) {
    const b = document.createElement('span');
    b.className = 'badge badge-'+game.badge;
    b.textContent = game.badge==='new'?'✨ חדש':game.badge==='hot'?'🔥 HOT':'👑 TOP';
    thumb.appendChild(b);
  }
  // embeddable indicator top-left
  const eb = document.createElement('span');
  eb.className = 'embed-badge ' + (canEmbed ? 'embed-yes' : 'embed-no');
  eb.textContent = canEmbed ? '▶ ניתן לשחק' : '↗ טאב חדש';
  thumb.appendChild(eb);
  // saves data badge bottom-left
  const sb = document.createElement('span');
  sb.className = 'saves-badge ' + (game.savesData ? 'saves-yes' : 'saves-no');
  sb.textContent = game.savesData ? '💾 שומר נתונים' : '🚫 לא שומר';
  thumb.appendChild(sb);
  // platform badge bottom-right
  const plat = game.platform || ['desktop', 'mobile'];
  const pb = document.createElement('span');
  pb.className = 'plat-badge';
  pb.textContent = plat.includes('desktop') && plat.includes('mobile') ? '🖥️📱' : plat.includes('mobile') ? '📱 נייד' : '🖥️ מחשב';
  thumb.appendChild(pb);
  // play overlay
  const ov = document.createElement('div'); ov.className = 'play-ov';
  ov.innerHTML = canEmbed ? '<div class="play-circle">▶</div>' : '<div class="play-circle-ext">↗</div>';
  thumb.appendChild(ov);
  const body = document.createElement('div'); body.className = 'card-body';
  const nameEl = document.createElement('div'); nameEl.className = 'card-name'; nameEl.textContent = game.name;
  const tagsEl = document.createElement('div'); tagsEl.className = 'card-tags';
  [...(game.categories||[]), ...(game.tags||[])].slice(0,4).forEach(t => {
    const s = document.createElement('span'); s.className = 'tag'; s.textContent = t; tagsEl.appendChild(s);
  });
  body.append(nameEl, tagsEl);
  card.append(thumb, body);
  card.addEventListener('click', () => {
    if (canEmbed) { openGame(game); }
    else { window.open(game.url, '_blank', 'noopener'); }
  });
  return card;
}

function noThumb(game, color) {
  const d = document.createElement('div'); d.className = 'no-thumb';
  const cat = (game.categories||[])[0];
  const icons = {action:'⚡',puzzle:'🧩',arcade:'👾',racing:'🏎️',rpg:'⚔️',strategy:'♟️',sports:'⚽',shooter:'🔫',board:'🎲',survival:'💀',casual:'🌟',adventure:'🗺️'};
  d.textContent = icons[cat]||'🎮';
  d.style.background = 'linear-gradient(135deg,'+(color||'#7b2fff')+'33,'+(color||'#7b2fff')+'11)';
  return d;
}

function openGame(game) {
  const bg = document.getElementById('modalBg');
  document.getElementById('modalTitle').textContent = game.name;
  document.getElementById('modalOpenLink').href = game.url;
  const meta = document.getElementById('modalMeta'); meta.innerHTML = '';
  const cat = (game.categories||[])[0];
  [...(game.categories||[]),...(game.tags||[])].forEach(t => {
    const s = document.createElement('span'); s.className = 'tag';
    const c = CAT_COLORS[t]; if(c){s.style.borderColor=c;s.style.color=c;}
    s.textContent = t; meta.appendChild(s);
  });
  const savesRow = document.getElementById('modalSaves');
  const savesText = document.getElementById('modalSavesText');
  const isLoggedIn = window._currentUser && !window._currentUser.isAnonymous;
  savesRow.style.display = isLoggedIn ? '' : 'none';
  if (game.savesData) {
    savesRow.className = 'modal-saves yes';
    savesText.textContent = 'ההתקדמות שלך נשמרת בענן ☁️';
  } else {
    savesRow.className = 'modal-saves no';
    savesText.textContent = 'ההתקדמות נשמרת במכשיר בלבד — לא מסונכרן בין מכשירים';
  }
  const iframe = document.getElementById('modalIframe');
  const err    = document.getElementById('modalErr');
  iframe.style.display=''; err.style.display='none';
  iframe.src = game.url;
  let timer = setTimeout(() => {
    try { const doc=iframe.contentDocument||iframe.contentWindow?.document; if(!doc||doc.URL==='about:blank') showErr(); } catch{}
  }, 4500);
  iframe.onload = () => { clearTimeout(timer); try { const d=iframe.contentDocument||iframe.contentWindow?.document; if(!d||d.body?.innerHTML==='') showErr(); } catch{} };
  iframe.onerror = showErr;
  bg.classList.add('open'); document.body.style.overflow='hidden';

  // analytics
  if (window._firebase) {
    window._firebase.logEvent(window._firebase.analytics, 'game_open', { game_id: game.id, game_name: game.name });
  }
}

function showErr() { document.getElementById('modalIframe').style.display='none'; document.getElementById('modalErr').style.display='flex'; }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); document.getElementById('modalIframe').src=''; document.body.style.overflow=''; }

// ── AUTH UI ──────────────────────────────────────────────
function openAuth() { document.getElementById('authBg').classList.add('open'); closeDropdown(); }
function closeAuth() { document.getElementById('authBg').classList.remove('open'); }
function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab==='login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('authErr').style.display = 'none';
}
function toggleDropdown() {
  document.getElementById('userDropdown').classList.toggle('open');
}
function closeDropdown() {
  document.getElementById('userDropdown').classList.remove('open');
}

// ── TOAST ────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── EVENTS ───────────────────────────────────────────────
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById('authBg').addEventListener('click', e => { if(e.target===e.currentTarget) closeAuth(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeModal(); closeAuth(); } });
document.addEventListener('click', e => { if(!document.getElementById('userMenu').contains(e.target)) closeDropdown(); });
document.getElementById('searchInput').addEventListener('input', function(){
  currentSearch=this.value;
  render();
  if (this.value.length > 2 && window._firebase) {
    clearTimeout(window._searchGA);
    window._searchGA = setTimeout(() => {
      window._firebase.logEvent(window._firebase.analytics, 'search', { search_term: this.value });
    }, 800);
  }
});

window.openAuth = openAuth;
window.closeAuth = closeAuth;
window.switchTab = switchTab;
window.toggleDropdown = toggleDropdown;
window.showToast = showToast;

load();
</script>
</body>
</html>
